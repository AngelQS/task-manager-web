name: React CI/CD

on:
  push:
    branches: [master, qa, develop]
  pull_request:
    branches: [master, qa, develop]

jobs:
  secret-scanning:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-scanning:
    name: 🔍 Code Scanning (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [secret-scanning, code-scanning]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  approval:
    name: 👀 Awaiting Approval
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    environment: approval
    steps:
      - name: Approval granted
        run: echo "Approved, proceeding with build and deploy"

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [approval]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Set build environment
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          if [ "$TARGET_BRANCH" == "master" ]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}" >> $GITHUB_ENV
            echo "DEPLOY_FLAGS=--prod" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Production 🟢" >> $GITHUB_ENV
          elif [ "$TARGET_BRANCH" == "qa" ]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_QA }}" >> $GITHUB_ENV
            echo "DEPLOY_FLAGS=" >> $GITHUB_ENV
            echo "DEPLOY_ENV=QA 🟡" >> $GITHUB_ENV
          else
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" >> $GITHUB_ENV
            echo "DEPLOY_FLAGS=" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Development 🔵" >> $GITHUB_ENV
          fi

      - name: Build
        run: vercel build ${{ env.DEPLOY_FLAGS }} --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output/

  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output/

      - name: Set deploy flags
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          if [ "$TARGET_BRANCH" == "master" ]; then
            echo "DEPLOY_FLAGS=--prod" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Production 🟢" >> $GITHUB_ENV
          elif [ "$TARGET_BRANCH" == "qa" ]; then
            echo "DEPLOY_FLAGS=" >> $GITHUB_ENV
            echo "DEPLOY_ENV=QA 🟡" >> $GITHUB_ENV
          else
            echo "DEPLOY_FLAGS=" >> $GITHUB_ENV
            echo "DEPLOY_ENV=Development 🔵" >> $GITHUB_ENV
          fi

      - name: Deploy (${{ env.DEPLOY_ENV }})
        run: vercel deploy --prebuilt ${{ env.DEPLOY_FLAGS }} --token=${{ secrets.VERCEL_TOKEN }} --yes --meta prTitle="${{ github.event.pull_request.title }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Auto-merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
